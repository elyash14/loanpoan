name: financial

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15.8
    container_name: financial-postgres-dev
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-2345}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-financial}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB:-financial},${N8N_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - financial-network

volumes:
  postgres_data:
    driver: local

networks:
  financial-network:
